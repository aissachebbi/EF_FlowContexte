# ---- Utilis?e si Colonne en BD TABLE FlowDefinition N'est pas null ----
mq2db.cbmsg.allowedColumns=CB_MSG_DB_ID,BIZ_MSG_IDR,BRANCH_DB_ID,CB_FILE_DB_ID,EZF_LOGICAL_FILE_NAME 

# ---- POLLER / SCHEDULING ----
# mq2db.poller.fixedDelayMs: fr?quence de scrutation des nouveaux messages (NEW -> IN_PROGRESS)
mq2db.poller.fixedDelayMs=1000
# mq2db.poll.maxTotalPerPoll: nombre de messages r?serv?s ? chaque tour du poller
mq2db.poll.maxTotalPerPoll=1000

# Parall?lisation du polling (nombre de threads de polling)
mq2db.poll.parallelism=8

# Parall?lisation du claim (nombre de threads par branche)
mq2db.claim.parallelism=500

# ---- PROCESSING / PERFORMANCE ----
# mq2db.processing.queuePollDelayMs: fr?quence de lecture des lots d'agr?gation lib?r?s (d?faut 500ms)
mq2db.processing.queuePollDelayMs=500
# mq2db.processing.queueMaxPerPoll: nombre de lots trait?s ? chaque tour du poller (d?faut 100)
mq2db.processing.queueMaxPerPoll=250
# Note: Ces lots sont ensuite trait?s en parall?le par un pool de 128 threads (afterAggregatorExecutor).
mq2db.processing.poolSize=128
# Note: L'agr?gateur SI est pilot? par un pool de 128 threads (siTaskScheduler).
mq2db.si.poolSize=128
# Note: Augmenter spring.datasource.hikari.maximum-pool-size pour supporter les pools.
# Somme : claim(500) + aggregation(128) + processing(128) + audit/misc(20) = ~776
spring.datasource.hikari.maximum-pool-size=800
spring.datasource.hikari.minimum-idle=100
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=Mq2DbHikariPool

# ---- CLOSED BRANCH AGGREGATION ----
mq2db.closedbranch.requeue2new.releaseSize=50
mq2db.closedbranch.requeue2new.groupTimeoutMs=5000

# ========================
# MQ2DB Audit (1 table)
# ========================
# D?sactiv? par d?faut comme demand?
mq2db.audit.enabled=true
mq2db.audit.table=ACETP.EF_MQ2DB_AUDIT_EVENT
mq2db.audit.batchPollerDelayMs=2000
mq2db.audit.batchSize=100
mq2db.audit.batchTimeoutMs=5000

# ---- DRAIN STATE (centralis?) ----
# Table de stockage de l'?tat de drainage en cluster (cr??e par V2_CLUSTER_DRAINAGE.sql)
mq2db.drain.state.table=EF_DRAIN_STATE
# TTL du cache local pour les lectures d'?tat (ms)
mq2db.drain.cacheTtlMs=3000





mq2db.flowRegistry.reloadPollerDelayMs=60000

acetp.easyflows.instance=local-2
acetp.easyflows.componentname=EasyFlows

# ---- AQ CONFIG ----
mq2db.aq.mode=ORACLE_AQ
mq2db.aq.queueName=MTM_IN